database:
  file:
    path: MemberDatabase.xlsx

ci-registration:
  format:
    # Each value is the exact column header text in the Cycling Ireland export file.
    # Update these if CI changes column names in a future export without modifying code.
    # Header matching is case-insensitive and ignores leading/trailing whitespace.
    # Leave a value blank ("") to mark that field as absent in this year's file.
    club: "Club"
    registration-date: ""             # Not present in 2026 export; not stored in member DB
    expiry-date: "Membership Year"    # Contains e.g. "2026"; code derives expiry as 31 Dec of that year
    license-number: "License Number"  # Spelling changed from "Licence" in 2026 export
    member-id: "UCIID"               # Was "MID" in previous exports
    category: "Category"
    rider-category: "Rider Category"
    first-name: "First Name"
    last-name: "Last Name"
    email: "Email"
    date-of-birth: "DOB"
    gender: "Gender"
    nationality: "Nationality"
    emergency-contact-name: ""        # Not present in 2026 export; existing DB values preserved
    emergency-contact-phone: ""       # Not present in 2026 export; existing DB values preserved
